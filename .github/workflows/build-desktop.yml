# 本地知识库桌面客户端 · 三平台构建（Windows / Linux / macOS，免签名内测）
#
# 原理：CI 自动拉取官方 anything-llm 源码 → 打上 astron /knowledge/v1 适配器（apply-adapter.cjs）
#       → 构建前端 + 暂存 server/collector + 随包 node → electron-builder 出当前平台安装包。
# 你不需要 fork anything-llm；CI 直接从 GitHub 拉官方源码。
#
# 触发：Actions 页手动 Run workflow，或推 tag v* 自动。
# 产物：Artifacts 里下载 windows-installer(.exe) / linux-installer(.AppImage) / mac-installer(.dmg)

name: build-desktop

on:
  workflow_dispatch:
    inputs:
      anyllm_ref:
        description: "astron-anything-llm fork 的分支/标签"
        default: "main"
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-installer
            node_name: node.exe
          - os: ubuntu-latest
            artifact: linux-installer
            node_name: node
          - os: macos-latest
            artifact: mac-installer
            node_name: node
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # 允许 CI 创建/更新 Release 并上传安装包资产
    steps:
      - name: Checkout build kit
        uses: actions/checkout@v4

      # 直接用 astron 自己的 fork（已含适配器/品牌/角标/菜单精简/跳过 onboarding 等全部定制），
      # 不再 checkout 官方 anything-llm + apply-adapter 打补丁。CI 打包的就是你自己的代码。
      - name: Checkout astron-anything-llm (fork)
        uses: actions/checkout@v4
        with:
          repository: yyjiang6/astron-anything-llm
          ref: ${{ github.event.inputs.anyllm_ref || 'main' }}
          path: anything-llm

      # anything-llm 部分依赖（如 @aws-sdk/credential-providers）要求 node>=20，故用 Node 20。
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # anything-llm 是 yarn 项目（只有 yarn.lock，无 package-lock.json），必须用 yarn，不能 npm ci
      # GITHUB_TOKEN：@vscode/ripgrep 的 postinstall 会调 GitHub API 下载预编译二进制，
      # CI 未带 token 会触发 403 限流。注入内置 token 后用其认证，绕开 403。
      # PUPPETEER_SKIP_DOWNLOAD：collector 依赖 puppeteer，其 postinstall 会下载 Chromium(~150MB)，
      # 在 CI（尤其 Windows runner）上常卡死/超时。跳过下载，install 才能正常完成。
      # （URL 网页抓取是次要功能，需要时运行环境另装 Chromium 即可；文档解析不受影响。）
      - name: Install server & collector
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          ( cd anything-llm/server && yarn install --network-timeout 600000 )
          ( cd anything-llm/collector && yarn install --network-timeout 600000 )

      # fork 仓库不含 db（gitignore）。CI 里生成一份已迁移 + 已标记 onboarding 完成的干净库随包，
      # 否则首启会卡 anything-llm 的欢迎向导。跨平台用 prisma，不依赖 sqlite3 CLI。
      - name: Prepare onboarded DB (skip first-run wizard)
        shell: bash
        run: |
          cd anything-llm/server
          npx prisma migrate deploy
          node -e "const {PrismaClient}=require('@prisma/client');const p=new PrismaClient();(async()=>{await p.system_settings.upsert({where:{label:'onboarding_complete'},update:{value:'true'},create:{label:'onboarding_complete',value:'true'}});await p.\$disconnect();})().catch(e=>{console.error(e);process.exit(1)})"

      - name: Build frontend -> server/public
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ( cd anything-llm/frontend && yarn install --network-timeout 600000 && echo "VITE_API_BASE='/api'" > .env.production && yarn build )
          rm -rf anything-llm/server/public && mkdir -p anything-llm/server/public
          cp -r anything-llm/frontend/dist/* anything-llm/server/public/

      - name: Stage payload
        shell: bash
        run: |
          rm -rf electron-wrapper/payload && mkdir -p electron-wrapper/payload
          cp -r anything-llm/server electron-wrapper/payload/server
          cp -r anything-llm/collector electron-wrapper/payload/collector
          node -e "const fs=require('fs');fs.copyFileSync(process.execPath,'electron-wrapper/payload/${{ matrix.node_name }}')"
          chmod +x "electron-wrapper/payload/${{ matrix.node_name }}" || true

      - name: Build installer
        shell: bash
        working-directory: electron-wrapper
        run: |
          npm install
          npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # macOS 跳过签名（内测）

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            electron-wrapper/dist/*.exe
            electron-wrapper/dist/*.AppImage
            electron-wrapper/dist/*.dmg
          if-no-files-found: warn
          retention-days: 14

      # 打 tag 触发时，把本平台安装包发布为公开 Release 资产（免 token 直接下载）。
      # 三个矩阵 job 共用同一 tag 的 Release，各自追加自己的安装包。
      - name: Publish installer to Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            electron-wrapper/dist/*.exe
            electron-wrapper/dist/*.AppImage
            electron-wrapper/dist/*.dmg
          fail_on_unmatched_files: false
